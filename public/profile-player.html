<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
        crossorigin="anonymous">
    </script>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous">
    </script>

    <script>
        function showPrev(fileRef, prevRef) {
            const [file] = fileRef.files
            if (file) {
                prevRef.src = URL.createObjectURL(file)
            }
        }
        function showadh(adhaar, prevadhaar) {
            const [file] = adhaar.files
            if (file) {
                prevadhaar.src = URL.createObjectURL(file)
            }
        }
        //---------------------------------------------------

        $(document).ready(function () {
      $("#search").click(function () {

        let obj = {
          type: "get",
          url: "/get-fourth",
          data: {
            txtemail: $("#txtemail").val()
          }
        }
        $.ajax(obj).then(function (responseJsonAry) {

          alert(JSON.stringify(responseJsonAry))
            
          let emailid=responseJsonAry[0].txtemail;
          let address=responseJsonAry[0].address;
          let sports=responseJsonAry[0].sports;
          let contact=responseJsonAry[0].contact;
          let info=responseJsonAry[0].info;


          $("#txtemail").val(emailid);
          $("#address").val(address);
          $("#info").val(info);
          $("#sports").val(sports);
          $("#contact").val(contact);


            $("#hdn").val(picurl)

            $("#prevadhaar").prop("src",picurl);
           $("#prev").prop("src",picurl);

            
        }).fail(function (err) {
          alert(err.message);
        })
      })
    })
    </script>

    <script>
         <script>
          function showuser(){
            let activeuser=localStorage.getItem("activeuser");
            document.getElementById("txtemail").value=activeuser;
          }
          
</script>
    </script>

</head>

<body onload=" showuser();">
    <div class="row ">
        <div class="col-md-12  bg-primary text-white" style="padding:14px 0px 14px 0px;">
            www.realJavaOnline.com
        </div>
    </div>
    <div class="container mt-4">


        <div class="col-md-8 offset-md-2">

            <form class="row g-3 needs-validation" novalidate action="/submission" enctype="multipart/form-data"
                method="post"
                style="border: 1px;box-shadow: 1px 1px 10px black; margin-bottom: 40px; margin-top: 40px;">
                <input type="hidden" id="hdn" name="hdn">


                <div class="row ">
                    <div class="col-md-8 offset-md-2  text-red">
                        <center>
                            <h2>Player Details</h2>
                        </center>
                    </div>
                </div>
                <div class="col-md-8">
                    <label for="validationCustom01" class="form-label">Email</label>

                    <input type="text" class="form-control" id="txtemail" name="txtemail" value="id" required>

                    <div class="valid-feedback">
                        .
                    </div>
                </div>
                <div class="col-md-4" style="float: right; margin-top: 46px;">
                    <button type="button" class="btn btn-success" data-bs-toggle="modal" id="search"
                        name="search">search</button>
                </div>

                <div class="col-md-6">
                    <label for="validationCustom03" class="form-label">Address</label>
                    <input type="text" class="form-control" id="address" name="address" required>
                    <div class="invalid-feedback">
                        Please provide a valid address
                    </div>
                </div>

                <div class="col-md-6">
                    <label for="validationCustom05" class="form-label">Games You Play</label>
                    <input type="text" class="form-control" id="sports" name="sports" required>
                    <div class="invalid-feedback">
                        <!-- Please provide a valid zip. -->
                    </div>
                </div>


                 <div>Upload Front Of Adhaar Card: </div>
                <div class="col-md-6">
                    <input type="file" name="adhaar" id="adhaar" onchange="showadh(adhaar,prevadhaar);"> <br><br>
                </div>
                <div class="col-md-4">
                    <img src="pics/customer.jpg" width="100" height="100" id="prevadhaar" alt="">
                </div>

                <div>Upload Profile Pic:</div>
                <div class="col-md-6">
                    <input type="file" name="profilepic" id="profilepic" onchange="showPrev(profilepic,prev)"> <br><br>
                </div>
                <div class="col-md-4">
                    <img src="pics/customer.jpg" width="100" height="100" id="prev" alt="">
                </div>


                <div class="col-md-6">
                    <label for="validationCustom05" class="form-label">name</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                    <div class="invalid-feedback">
                        <!-- Please provide a valid zip. -->
                    </div>
                </div>

                <div class="col-md-6">
                    <label for="validationCustom05" class="form-label">date of birth</label>
                    <input type="text" class="form-control" id="dob" name="dob" required>
                    <div class="invalid-feedback">
                        <!-- Please provide a valid zip. -->
                    </div>
                </div>

                 <div class="col-md-6">
                    <label for="validationCustom05" class="form-label">gender</label>
                    <input type="text" class="form-control" id="gender" name="gender" required>
                    <div class="invalid-feedback">
                        <!-- Please provide a valid zip. -->
                    </div>
                </div>

                 <div class="col-md-6">
                    <label for="validationCustom01" class="form-label">contact no</label>
                    <input type="text" class="form-control" id="contact" name="contact" value="" required>
                    <div class="valid-feedback">
                        .
                    </div>
                </div>


               
               
                <div class="col-md-12" style="margin-top: 40px;">
                    <label for="validationCustom01" class="form-label">Additional Info</label>
                    <input type="textarea" class="form-control" id="info" name="info" value="" required>
                    <div class="valid-feedback">
                        .
                    </div>
                </div>
                <div class="col-4">
                    <button class="btn btn-primary" type="submit"
                        style="align-content: center;margin-left:200px; margin-bottom: 20px;">upload
                    </button>
                </div>
                <div class="col-4">
                    <button class="btn btn-primary" type="submit"
                        style="align-content: center;margin-left:150px; margin-bottom: 20px;"
                        formaction="/change">Modify</button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
